# AIDEV-NOTE: Dev environment with hot reload.
# Usage: docker compose up
# Source is bind-mounted so changes are picked up immediately by tsx watch (server)
# and Vite HMR (web). node_modules uses a named volume to avoid host/container
# platform mismatch (macOS vs Linux native binaries).
services:
  mixtape:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '3001:3001' # Hono server
      - '5173:5173' # Vite dev server
    env_file: .env
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: >
      sh -c "pnpm install && pnpm --filter shared build && pnpm dev"

volumes:
  node_modules:
